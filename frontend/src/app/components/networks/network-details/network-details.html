@if (network(); as network) {
  <div class="network-details">
    <div class="network-details-header">
      <div>
        <h2>{{ network.name }}</h2>
        <small>Created: {{ network.createdAt | date: 'yyyy-MM-dd HH:mm' }}</small>
        @if (errorMessage(); as errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }
      </div>
      <div class="network-actions">
        <button type="button" (click)="edit()">Edit</button>
        <button class="danger" type="button" (click)="delete()">Delete</button>
      </div>
    </div>
    <div class="network-details-description">
      <p>Details:</p>
      <p>{{ network.description || 'No description' }}</p>
    </div>
  </div>
} @else {
  <p>Loading...</p>
}
