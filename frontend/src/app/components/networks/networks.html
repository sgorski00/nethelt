<div class="side-nav">
  <div class="side-nav-header">
    <h4>Networks</h4>
    <button type="button" class="icon-button" (click)="reloadNetworks()" title="Reload networks">
      <i class="fa-solid fa-rotate-right"></i>
    </button>
  </div>
  @if (networks(); as networks) {
    @for (network of networks; track network.id) {
      <a [routerLink]="[network.id]" class="side-nav-link">{{ network.name }}</a>
    } @empty {
      <p>No networks found</p>
    }
  } @else {
    <p>Loading...</p>
  }
  <a routerLink="create" class="side-nav-link bottom-link">Create Network</a>
</div>
<div class="content">
  <router-outlet #outlet="outlet"></router-outlet>
  @if (!outlet.isActivated) {
    <h2>Select a network to view details</h2>
    @if (message(); as message) {
      <div class="message-box">
        <p class="neutral-message">{{ message }}</p>
      </div>
    }
  }
</div>
