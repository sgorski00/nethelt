<div class="form-container">
  <h2>Create new network</h2>
  <form class="form" [formGroup]="networkCreateForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" />
      @if (networkCreateForm.controls.name.invalid && networkCreateForm.controls.name.touched) {
        <small class="error-message">Name is required and must be max 100 characters.</small>
      }
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit">Create</button>
    </div>
    @if (errorMessage()) {
      <p class="error-message centered">{{ errorMessage() }}</p>
    }
  </form>
</div>
