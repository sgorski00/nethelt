name: ng-linter.yml
on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: ./frontend

jobs:
  ng-linter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontent/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run prettier
        run: npx prettier . --check
