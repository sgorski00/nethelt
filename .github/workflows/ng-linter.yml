name: ng-linter.yml
on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  ng-linter:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run prettier
        working-directory: ./frontend
        run: npx prettier . --check
